 antq_curiae_veteres: "Curiae Veteres"
 antq_curiae_veteres_desc: "The ancient Palatine curial shrine-house, retained as a civic-religious landmark in Augustan Rome."
 antq_curiae_veteres_maintenance: "Curiae Veteres Upkeep"
 antq_aedes_concordiae_augustae: "Temple of Concordia"
 antq_aedes_concordiae_augustae_desc: "Republican Forum cult site renewed under Augustus."
 antq_aedes_concordiae_augustae_maintenance: "Temple of Concordia Upkeep"
 antq_aedes_bellonae: "Temple of Bellona"
 antq_aedes_bellonae_desc: "Republican Temple of Bellona rebuilt in the Augustan period."
 antq_aedes_bellonae_maintenance: "Temple of Bellona Upkeep"
 antq_aedes_iovis_tonantis: "Temple of Jupiter Tonans"
 antq_aedes_iovis_tonantis_desc: "Augustus' Capitoline temple vowed in 26 BC and dedicated in 22 BC."
 antq_aedes_iovis_tonantis_maintenance: "Temple of Jupiter Tonans Upkeep"
 antq_aedes_magnae_matris: "Temple of Magna Mater"
 antq_aedes_magnae_matris_desc: "Palatine sanctuary dedicated in 191 BC and standing at AD 1 before its AD 3 fire."
 antq_aedes_magnae_matris_maintenance: "Temple of Magna Mater Upkeep"
 antq_forum_iulium: "Forum Iulium"
 antq_forum_iulium_desc: "Caesar's forum dedicated in 46 BC and completed/rededicated by Octavian in 44 BC."
 antq_forum_iulium_maintenance: "Forum Iulium Upkeep"
 antq_aedes_divi_iulii: "Temple of Divus Julius"
 antq_aedes_divi_iulii_desc: "Forum temple of the deified Julius Caesar completed before AD 1."
 antq_aedes_divi_iulii_maintenance: "Temple of Divus Julius Upkeep"
 antq_aedes_fortunae_primigeniae: "Shrine of Fortuna Primigenia"
 antq_aedes_fortunae_primigeniae_desc: "Capitoline shrine attested beside Jupiter Tonans."
 antq_aedes_fortunae_primigeniae_maintenance: "Shrine of Fortuna Primigenia Upkeep"
 antq_puteal_libonis: "Puteal Libonis"
 antq_puteal_libonis_desc: "Forum stone wellhead/monument associated with Scribonius Libo and lightning."
 antq_puteal_libonis_maintenance: "Puteal Libonis Upkeep"
 antq_casa_romuli: "Casa Romuli"
