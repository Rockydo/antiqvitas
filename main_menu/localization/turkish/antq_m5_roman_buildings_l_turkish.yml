 antq_chalcidicum_iulium_maintenance: "Chalcidicum Iulium Upkeep"
 antq_aedes_victoriae: "Temple of Victoria"
 antq_aedes_victoriae_desc: "Long-standing Palatine Temple of Victory retained as a Republican cult landmark."
 antq_aedes_victoriae_maintenance: "Temple of Victoria Upkeep"
 antq_castra_vetera: "Castra Vetera"
 antq_castra_vetera_desc: "The Augustan legionary camp at Vetera near Xanten, established in 13 or 12 BC and active at the AD 1 start."
