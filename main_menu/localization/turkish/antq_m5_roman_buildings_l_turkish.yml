 antq_miliarium_aureum_maintenance: "Miliarium Aureum Upkeep"
 antq_aedes_penatium: "Aedes Penatium"
 antq_aedes_penatium_desc: "The Temple of the Penates on the Velia, rebuilt by Augustus and securely present at the campaign boundary."
 antq_aedes_penatium_maintenance: "Aedes Penatium Upkeep"
 antq_fornix_fabianus: "Fornix Fabianus"
 antq_fornix_fabianus_desc: "The Republican triumphal arch erected in 121 BC at the Forum's Sacra Via approach."
 antq_fornix_fabianus_maintenance: "Fornix Fabianus Upkeep"
 antq_ara_saturni: "Ara Saturni"
 antq_ara_saturni_desc: "The ancient altar of Saturn at the foot of the Clivus Capitolinus in the Forum area."
 antq_ara_saturni_maintenance: "Ara Saturni Upkeep"
 antq_rostra_augusti: "Rostra Augusti"
