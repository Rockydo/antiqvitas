l_simp_chinese:
 # Generated named AD 1 Roman civic and naval building localization; English mirrored by design.
 antq_aqua_virgo: "Aqua Virgo"
 antq_aqua_virgo_desc: "Agrippa's aqueduct, completed in 19 BC, supplying the Campus Martius and the Baths of Agrippa."
 antq_aqua_virgo_maintenance: "Aqua Virgo Upkeep"
 antq_horrea_publica: "Horrea Publica"
 antq_horrea_publica_desc: "Public grain-storage capacity supporting the Augustan annona at Rome."
 antq_horrea_publica_maintenance: "Horrea Publica Upkeep"
 antq_forum_romanum: "Forum Romanum"
 antq_forum_romanum_desc: "The long-standing civic and commercial centre of Rome, represented as a forum of law, exchange, and public assembly."
 antq_forum_romanum_maintenance: "Forum Romanum Upkeep"
 antq_forum_augusti: "Forum Augusti"
 antq_forum_augusti_desc: "Augustus' forum and the Temple of Mars Ultor, dedicated in 2 BC and used for senate votes, ritual, foreign-policy decisions, and trials."
 antq_forum_augusti_maintenance: "Forum Augusti Upkeep"
 antq_basilica_aemilia: "Basilica Aemilia"
 antq_basilica_aemilia_desc: "A civil basilica in the Forum, rebuilt by Augustus after the fire of 14 BC and serving legal and commercial forum functions."
 antq_basilica_aemilia_maintenance: "Basilica Aemilia Upkeep"
 antq_macellum_romanum: "Macellum Romanum"
 antq_macellum_romanum_desc: "The food market near the Forum Romanum and Argiletum, rebuilt in 179 BC."
 antq_macellum_romanum_maintenance: "Macellum Romanum Upkeep"
 antq_horrea_galbana: "Horrea Galbana"
 antq_horrea_galbana_desc: "The extensive late-Republican warehouse complex of the Emporium district near the Tiber, securely established before AD 1."
 antq_horrea_galbana_maintenance: "Horrea Galbana Upkeep"
 antq_thermae_agrippae: "Thermae Agrippae"
 antq_thermae_agrippae_desc: "Agrippa's public baths in the Campus Martius, built between 25 and 19 BC and supplied by the Aqua Virgo."
 antq_thermae_agrippae_maintenance: "Thermae Agrippae Upkeep"
 antq_theatrum_marcelli: "Theatrum Marcelli"
 antq_theatrum_marcelli_desc: "Theatre begun under Caesar and completed under Augustus, inaugurated in 13 or 11 BC."
 antq_theatrum_marcelli_maintenance: "Theatrum Marcelli Upkeep"
 antq_theatrum_balbi: "Theatrum Balbi"
 antq_theatrum_balbi_desc: "The smallest of Rome's three stone theatres, built by L. Cornelius Balbus and dedicated in 13 BC in the Campus Martius."
 antq_theatrum_balbi_maintenance: "Theatrum Balbi Upkeep"
 antq_templum_martis_ultoris: "Templum Martis Ultoris"
 antq_templum_martis_ultoris_desc: "Temple of Mars Ultor anchoring the Forum Augusti, dedicated in 2 BC."
 antq_templum_martis_ultoris_maintenance: "Templum Martis Ultoris Upkeep"
 antq_tabularium: "Tabularium"
 antq_tabularium_desc: "The Republican archive complex on the Capitoline, retained as an administrative and records-keeping special building with a cautious interpretation."
 antq_tabularium_maintenance: "Tabularium Upkeep"
 antq_circus_maximus: "Circus Maximus"
 antq_circus_maximus_desc: "Rome's oldest and largest circus, a long-standing venue for chariot racing, hunts, athletic contests, and public entertainment."
 antq_circus_maximus_maintenance: "Circus Maximus Upkeep"
 antq_monetarium_roma: "Monetarium Romae"
 antq_monetarium_roma_desc: "Imperial minting capacity of the Roman capital, represented as civic coinage administration."
 antq_monetarium_roma_maintenance: "Monetarium Romae Upkeep"
 antq_navalia_romae: "Navalia Romae"
 antq_navalia_romae_desc: "The Tiberine warship sheds and naval arsenal of Rome, established by the Republican period and retained as a cautious city-scale naval-supply anchor."
 antq_navalia_romae_maintenance: "Navalia Romae Upkeep"
 antq_classis_ravennatis: "Classis Ravennatis"
 antq_classis_ravennatis_desc: "Augustus' military harbour at Classe near Ravenna, begun in 27 BC as an Adriatic and eastern-Mediterranean fleet base."
 antq_classis_ravennatis_maintenance: "Classis Ravennatis Upkeep"
 antq_castrum_mogontiacum: "Castrum Mogontiacum"
 antq_castrum_mogontiacum_desc: "The Augustan legionary camp founded opposite the Main in 13 or 12 BC, nucleus of Mogontiacum on the Rhine frontier."
 antq_castrum_mogontiacum_maintenance: "Castrum Mogontiacum Upkeep"
 antq_castrum_novaesium: "Castrum Novaesium"
 antq_castrum_novaesium_desc: "The timber-and-earth Roman garrison established at the Erft mouth in 16 BC, the Augustan precursor of Novaesium on the Lower Rhine."
 antq_castrum_novaesium_maintenance: "Castrum Novaesium Upkeep"
 antq_castrum_hunnerberg: "Castrum Hunnerberg"
 antq_castrum_hunnerberg_desc: "The large Augustan military camp on Nijmegen's Hunnerberg, established around 19 BC and active around AD 1 on the Lower Rhine frontier."
 antq_castrum_hunnerberg_maintenance: "Castrum Hunnerberg Upkeep"
 antq_castrum_augusta_raurica: "Augusta Raurica Camp"
 antq_castrum_augusta_raurica_desc: "A modest timber military camp at Kaiseraugst beside the Augusta Raurica settlement, where Augustan construction began after 15 BC."
 antq_castrum_augusta_raurica_maintenance: "Augusta Raurica Camp Upkeep"
 antq_officinae_urbanae: "Officinae Urbanae"
 antq_officinae_urbanae_desc: "An urban craft quarter representing workshops for pottery, metalwork, masonry, and other city-serving manufactures."
 antq_officinae_urbanae_maintenance: "Officinae Urbanae Upkeep"
 antq_pistrina_urbana: "Pistrina Urbana"
 antq_pistrina_urbana_desc: "Urban milling and baking capacity turning grain into bread for Rome's dense population."
 antq_pistrina_urbana_maintenance: "Pistrina Urbana Upkeep"
 antq_villa_liviae: "Villa Liviae"
 antq_villa_liviae_desc: "A conservative Rome-region proxy for the productive suburban estate associated with Livia at Prima Porta."
 antq_villa_liviae_maintenance: "Villa Liviae Upkeep"
 antq_pantheum_agrippae: "Pantheum Agrippae"
 antq_pantheum_agrippae_desc: "Agrippa's Pantheum in the Campus Martius, erected around 27 BC and represented as an Augustan open-sky cult complex rather than the later Hadrianic rotunda."
 antq_pantheum_agrippae_maintenance: "Pantheum Agrippae Upkeep"
 antq_saepta_iulia: "Saepta Iulia"
 antq_saepta_iulia_desc: "The great porticoed Campus Martius enclosure dedicated by Agrippa in 26 BC for the tribal assemblies' voting."
 antq_saepta_iulia_maintenance: "Saepta Iulia Upkeep"
 antq_diribitorium: "Diribitorium"
 antq_diribitorium_desc: "The great covered Campus Martius hall completed by Augustus in 7 BC where votes cast in the adjacent Saepta were counted."
 antq_diribitorium_maintenance: "Diribitorium Upkeep"
 antq_templum_apollinis_palatini: "Templum Apollinis in Palatio"
 antq_templum_apollinis_palatini_desc: "Augustus' Temple of Apollo on the Palatine, dedicated on 9 October 28 BC after Actium."
 antq_templum_apollinis_palatini_maintenance: "Templum Apollinis in Palatio Upkeep"
 antq_bibliotheca_latina_graecaque: "Bibliotheca Latina Graecaque"
 antq_bibliotheca_latina_graecaque_desc: "Augustus' Greek-and-Latin Palatine library, in use by about 23 BC and also a setting for senatorial business."
 antq_bibliotheca_latina_graecaque_maintenance: "Bibliotheca Latina Graecaque Upkeep"
 antq_curia_iulia: "Curia Iulia"
 antq_curia_iulia_desc: "The Senate house on the north side of the Forum, essentially built by Augustus in 29 BC."
 antq_curia_iulia_maintenance: "Curia Iulia Upkeep"
 antq_porticus_octaviae: "Porticus Octaviae"
 antq_porticus_octaviae_desc: "The Augustan restoration of the Porticus Metelli near the Circus Flaminius, with a library and civic rooms added between 27 and 23 BC."
 antq_porticus_octaviae_maintenance: "Porticus Octaviae Upkeep"
 antq_porticus_aemiliae: "Porticus Aemilia (Emporium)"
 antq_porticus_aemiliae_desc: "The vast Tiber-side Emporium warehouse traditionally identified as Porticus Aemilia, a Republican structure still shaping Augustan Rome's river trade."
 antq_porticus_aemiliae_maintenance: "Porticus Aemilia (Emporium) Upkeep"
 antq_aqua_alsietina: "Aqua Alsietina"
 antq_aqua_alsietina_desc: "Augustus' water channel, built before 2 BC to supply the Naumachia and also used for Trans-Tiberim irrigation and emergency water."
 antq_aqua_alsietina_maintenance: "Aqua Alsietina Upkeep"
 antq_naumachia_augusti: "Naumachia Augusti"
 antq_naumachia_augusti_desc: "Augustus' large Trans-Tiberim water basin, dedicated in 2 BC for public aquatic displays."
 antq_naumachia_augusti_maintenance: "Naumachia Augusti Upkeep"
 antq_horologium_augusti: "Horologium Augusti"
 antq_horologium_augusti_desc: "Augustus' Campus Martius solar-calendar monument, constructed in 10 BC around an obelisk gnomon and bronze meridian line."
 antq_horologium_augusti_maintenance: "Horologium Augusti Upkeep"
 antq_ara_pacis_augustae: "Ara Pacis Augustae"
 antq_ara_pacis_augustae_desc: "The Altar of Augustan Peace in the Campus Martius, decreed in 13 BC and dedicated on 30 January 9 BC."
 antq_ara_pacis_augustae_maintenance: "Ara Pacis Augustae Upkeep"
 antq_mausoleum_augusti: "Mausoleum Augusti"
 antq_mausoleum_augusti_desc: "Augustus' monumental Campus Martius tomb, already substantially complete by 28 BC and set within public groves and walks."
 antq_mausoleum_augusti_maintenance: "Mausoleum Augusti Upkeep"
 antq_amphitheatrum_statilii_tauri: "Amphitheatrum Statilii Tauri"
 antq_amphitheatrum_statilii_tauri_desc: "Rome's first stone amphitheatre, built by T. Statilius Taurus and dedicated in 29 BC."
 antq_amphitheatrum_statilii_tauri_maintenance: "Amphitheatrum Statilii Tauri Upkeep"
 antq_porticus_liviae: "Porticus Liviae"
 antq_porticus_liviae_desc: "A public recreational quadriporticus on the Oppian, dedicated in 7 BC in Livia's name."
 antq_porticus_liviae_maintenance: "Porticus Liviae Upkeep"
 antq_castrum_augusta_vindelicum: "Castrum Augusta Vindelicum"
 antq_castrum_augusta_vindelicum_desc: "The Roman military depot and camp at Augsburg-Oberhausen, established in the Alpine campaign period and present around the AD 1 boundary."
 antq_castrum_augusta_vindelicum_maintenance: "Castrum Augusta Vindelicum Upkeep"
 antq_castrum_argentoratum: "Castrum Argentoratum"
 antq_castrum_argentoratum_desc: "The Roman legionary camp founded under Drusus in 12 BC at Argentoratum, the Augustan origin of Strasbourg's military settlement."
 antq_castrum_argentoratum_maintenance: "Castrum Argentoratum Upkeep"
 antq_castrum_aliso: "Castrum Aliso (Haltern)"
 antq_castrum_aliso_desc: "The fortified Augustan main camp at Haltern on the Lippe, active around AD 1 and constructed with timber-and-earth defenses and internal buildings."
 antq_castrum_aliso_maintenance: "Castrum Aliso (Haltern) Upkeep"
 antq_castrum_bonna: "Early Bonna Camp"
 antq_castrum_bonna_desc: "An early Augustan Roman auxiliary camp at Bonna, established during Drusus' Rhine offensive before the later permanent legionary fortress."
 antq_castrum_bonna_maintenance: "Early Bonna Camp Upkeep"
 antq_pons_fabricius: "Pons Fabricius"
 antq_pons_fabricius_desc: "The 62 BC stone bridge to the Tiber Island, partly restored after the flood of 23 BC."
 antq_pons_fabricius_maintenance: "Pons Fabricius Upkeep"
 antq_pons_aemilius: "Pons Aemilius"
 antq_pons_aemilius_desc: "The long-standing Republican stone bridge at the Forum Boarium and Tiber crossing."
 antq_pons_aemilius_maintenance: "Pons Aemilius Upkeep"
 antq_fornix_augusti: "Fornix Augusti"
 antq_fornix_augusti_desc: "A marble arch recording Augustus' rebuilding after he became Pontifex Maximus in 12 BC."
 antq_fornix_augusti_maintenance: "Fornix Augusti Upkeep"
 antq_porticus_ad_nationes: "Porticus ad Nationes"
 antq_porticus_ad_nationes_desc: "A predominantly Augustan public portico associated with the Porticus Lentulorum area."
 antq_porticus_ad_nationes_maintenance: "Porticus ad Nationes Upkeep"
 antq_porticus_octavia: "Porticus Octavia"
 antq_porticus_octavia_desc: "A predominantly Augustan portico near the Circus Flaminius and Theatre of Pompey."
 antq_porticus_octavia_maintenance: "Porticus Octavia Upkeep"
 antq_hecatostylum: "Hecatostylum"
 antq_hecatostylum_desc: "The hundred-columned public structure conventionally linked to the Porticus Lentulorum."
 antq_hecatostylum_maintenance: "Hecatostylum Upkeep"
 antq_tiber_embankment: "Tiber Grand Embankment"
 antq_tiber_embankment_desc: "A massive tufa-and-concrete retaining wall at the Forum Boarium bridgehead."
 antq_tiber_embankment_maintenance: "Tiber Grand Embankment Upkeep"
 antq_porticus_post_navalia: "Porticus post Navalia"
 antq_porticus_post_navalia_desc: "A Republican-period portico conventionally identified behind the Tiberine naval sheds."
 antq_porticus_post_navalia_maintenance: "Porticus post Navalia Upkeep"
 antq_porticus_forum_holitorium: "Forum Holitorium Portico"
 antq_porticus_forum_holitorium_desc: "The monumental porticoed edge of the Republican Forum Holitorium near the city approach."
 antq_porticus_forum_holitorium_maintenance: "Forum Holitorium Portico Upkeep"
 antq_aedes_portuni: "Aedes Portuni"
 antq_aedes_portuni_desc: "The Republican Ionic temple near the Tiber and Forum Boarium, conventionally identified as Portunus' temple."
 antq_aedes_portuni_maintenance: "Aedes Portuni Upkeep"
 antq_regia: "Regia"
 antq_regia_desc: "The long-standing Forum complex traditionally associated with Rome's pontifical administration."
 antq_regia_maintenance: "Regia Upkeep"
 antq_circus_flaminius: "Circus Flaminius"
 antq_circus_flaminius_desc: "The Republican public circus-space in the Campus Martius, retained as an Augustan civic landmark."
 antq_circus_flaminius_maintenance: "Circus Flaminius Upkeep"
